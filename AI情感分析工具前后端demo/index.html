<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 情感分析工具</title>
  <style>
    /* ========== 全局样式：深色模式，简约专业风格 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* 主色调：深色背景 + 字节跳动风格红色点缀 */
      --bg-primary: #0d0d0f;
      --bg-secondary: #16161a;
      --bg-card: #1c1c21;
      --border-color: #2a2a32;
      --text-primary: #f5f5f7;
      --text-secondary: #8b8b95;
      --accent: #fe2c55;
      --accent-hover: #ff4d6d;
      --accent-glow: rgba(254, 44, 85, 0.25);
      --positive: #00d68f;
      --negative: #ff4757;
      --neutral: #ffc048;
      --radius: 12px;
      --transition: 0.2s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* 顶部渐变装饰线 */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 100;
    }

    /* ========== 布局容器 ========== */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    /* ========== 页头 ========== */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #ff6b8a);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 15px;
      margin-top: 8px;
    }

    /* ========== 卡片 ========== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* ========== 文本输入框 ========== */
    textarea {
      width: 100%;
      min-height: 160px;
      padding: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      line-height: 1.7;
      resize: vertical;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    textarea::placeholder {
      color: #55555f;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    /* ========== 分析按钮 ========== */
    .btn-analyze {
      width: 100%;
      padding: 14px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition),
        box-shadow var(--transition);
      letter-spacing: 0.5px;
    }

    .btn-analyze:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 4px 20px var(--accent-glow);
      transform: translateY(-1px);
    }

    .btn-analyze:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-analyze:disabled {
      background: #3a3a42;
      color: #666;
      cursor: not-allowed;
    }

    /* ========== 加载状态 ========== */
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ========== 结果展示 ========== */
    .result-section {
      display: none;
    }

    .result-section.show {
      display: block;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .result-item {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .result-item .label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .result-item .value {
      font-size: 24px;
      font-weight: 700;
    }

    /* 情感倾向颜色 */
    .sentiment-positive { color: var(--positive); }
    .sentiment-negative { color: var(--negative); }
    .sentiment-neutral  { color: var(--neutral); }

    /* 置信度进度条 */
    .confidence-bar-wrap {
      margin-top: 20px;
    }

    .confidence-bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .confidence-bar {
      height: 6px;
      background: var(--bg-secondary);
      border-radius: 3px;
      overflow: hidden;
    }

    .confidence-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), #ff6b8a);
      transition: width 0.6s ease;
      width: 0%;
    }

    /* ========== 错误提示 ========== */
    .error-msg {
      display: none;
      padding: 14px 16px;
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid rgba(255, 71, 87, 0.3);
      border-radius: 8px;
      color: var(--negative);
      font-size: 14px;
      margin-top: 16px;
    }

    .error-msg.show {
      display: block;
    }

    /* ========== 页脚 ========== */
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 12px;
      color: #44444d;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 480px) {
      .container { padding: 32px 16px 48px; }
      .header h1 { font-size: 22px; }
      .result-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 页头 -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">💬</div>
        <h1>AI 情感分析</h1>
      </div>
      <p>输入任意中文文本，由 DeepSeek V3 智能识别情感倾向</p>
    </header>

    <!-- 输入区域 -->
    <div class="card">
      <div class="card-label">输入文本</div>
      <textarea
        id="textInput"
        placeholder="在此输入需要分析的文本，例如：今天天气真好，心情特别愉快！"
        maxlength="5000"
      ></textarea>
      <div class="char-count"><span id="charCount">0</span> / 5000</div>
    </div>

    <!-- 分析按钮 -->
    <button class="btn-analyze" id="analyzeBtn" onclick="startAnalysis()">
      开始分析
    </button>

    <!-- 加载状态 -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>正在分析中...</span>
    </div>

    <!-- 错误提示 -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- 分析结果 -->
    <div class="result-section" id="resultSection">
      <div class="card" style="margin-top: 20px;">
        <div class="card-label">分析结果</div>
        <div class="result-grid">
          <div class="result-item">
            <div class="label">情感倾向</div>
            <div class="value" id="sentimentValue">—</div>
          </div>
          <div class="result-item">
            <div class="label">置信度</div>
            <div class="value" id="confidenceValue">—</div>
          </div>
        </div>
        <div class="confidence-bar-wrap">
          <div class="confidence-bar-header">
            <span>置信度</span>
            <span id="confidencePercent">0%</span>
          </div>
          <div class="confidence-bar">
            <div class="confidence-bar-fill" id="confidenceBar"></div>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">Powered by DeepSeek V3 · Flask Demo</footer>
  </div>

  <script>
    // ========== DOM 元素引用 ==========
    const textInput = document.getElementById("textInput");
    const charCount = document.getElementById("charCount");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const loading = document.getElementById("loading");
    const errorMsg = document.getElementById("errorMsg");
    const resultSection = document.getElementById("resultSection");
    const sentimentValue = document.getElementById("sentimentValue");
    const confidenceValue = document.getElementById("confidenceValue");
    const confidencePercent = document.getElementById("confidencePercent");
    const confidenceBar = document.getElementById("confidenceBar");

    // 是否正在分析中（防止重复点击）
    let isAnalyzing = false;

    // ========== 字数统计 ==========
    textInput.addEventListener("input", function () {
      charCount.textContent = this.value.length;
    });

    // ========== 核心：发起情感分析 ==========
    async function startAnalysis() {
      // 防止重复点击
      if (isAnalyzing) return;

      const text = textInput.value.trim();

      // 前端校验：文本不能为空
      if (!text) {
        showError("请输入要分析的文本内容");
        return;
      }

      // 进入加载状态
      setLoading(true);
      hideError();
      hideResult();

      try {
        // 调用后端 API
        const response = await fetch("/api/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text }),
        });

        const data = await response.json();

        // 处理错误响应
        if (!response.ok) {
          throw new Error(data.error || "分析失败，请稍后重试");
        }

        // 展示分析结果
        showResult(data.sentiment, data.confidence);
      } catch (err) {
        // 网络错误或 API 异常
        const message =
          err.message === "Failed to fetch"
            ? "无法连接服务器，请确认后端服务是否已启动"
            : err.message;
        showError(message);
      } finally {
        setLoading(false);
      }
    }

    // ========== UI 状态控制函数 ==========

    /** 切换加载状态 */
    function setLoading(active) {
      isAnalyzing = active;
      analyzeBtn.disabled = active;
      analyzeBtn.textContent = active ? "分析中..." : "开始分析";
      loading.classList.toggle("show", active);
    }

    /** 显示错误信息 */
    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.add("show");
    }

    /** 隐藏错误信息 */
    function hideError() {
      errorMsg.classList.remove("show");
    }

    /** 隐藏结果区域 */
    function hideResult() {
      resultSection.classList.remove("show");
    }

    /** 展示分析结果 */
    function showResult(sentiment, confidence) {
      // 设置情感倾向文字及颜色
      sentimentValue.textContent = sentiment;
      sentimentValue.className = "value";
      if (sentiment === "正面") {
        sentimentValue.classList.add("sentiment-positive");
      } else if (sentiment === "负面") {
        sentimentValue.classList.add("sentiment-negative");
      } else {
        sentimentValue.classList.add("sentiment-neutral");
      }

      // 设置置信度
      confidenceValue.textContent = confidence + "%";
      confidencePercent.textContent = confidence + "%";

      // 动画更新进度条
      confidenceBar.style.width = "0%";
      resultSection.classList.add("show");
      // 延迟一帧触发 CSS 过渡动画
      requestAnimationFrame(() => {
        confidenceBar.style.width = confidence + "%";
      });
    }

    // 支持 Ctrl+Enter 快捷键提交
    textInput.addEventListener("keydown", function (e) {
      if (e.ctrlKey && e.key === "Enter") {
        startAnalysis();
      }
    });
  </script>
</body>
</html>
